version: "3.8"

services:
  backend:
    build:
      context: ./iyipl-backend
      dockerfile: Dockerfile
    container_name: iyipl_backend
    ports:
      - "9000:8000"
    environment:
      - DATABASE_URL=sqlite:////app/data/iyipl.db
    volumes:
      - backend_data:/app/data
    restart: unless-stopped

  frontend:
    build:
      context: ./iyipl-frontend
      dockerfile: Dockerfile
    container_name: iyipl_frontend
    ports:
      - "9090:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  backend_data: {}
